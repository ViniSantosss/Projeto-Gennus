<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar na sua conta - Gennus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet">
    <link rel="stylesheet" href="login.css"> 
 
</head>
<body>
    <div class="container">
        <!--login form-->
        <div class="form-box login"></div>
            <!--register form-->
            <div class="form-box register"></div>

            <!--toggle box -->
            <div class="toggle-box">
            <!--toggle box left-->
            <div class="toggle-panel toggle-left">
                <h1>Hello, Welcome!</h1>
                <p>Don't hae a account?</p>
            </div>

            <!--toggle box right-->
            <div class="toggle-panel toggle-right">
                <h1>Welcome Back!</h1>
                <p>Already have an Account?</p>
                <button class="btn login-btn">Login</button>
            </div>
       </div>
    </div>
</body>
</html>
