<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar na sua conta - Gennus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet">
    <link rel="stylesheet" href="login.css"> 
 
</head>
<body>

    <main class="login-page">

        <div class="user-login-container"> <!--caixa do login-->
            <h2 class="login-title">Entrar na sua conta</h2>
            <form action="/servidor-php-aqui">

                <!-- formulario pro email-->

                <div class="form-login-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <!-- formulario pra senha-->

                <div class="form-login-group">
                    <label for="password">Senha:</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <!--formulario pra lembrar, acho que falta alguma função pra conectar
                no JS-->

                <div class="form-login-group">
                    <div class="remember-me-option">
                        <label for="remember-me">Lembrar-me</label>
                        <input type="checkbox" id="remember-me" name="remember-me">
                    </div>

                    <!-- link pra ir pra página de resetar a senha ou pegar um código pra trocar de senha ou só logar, sei lá-->

                    <a href="password-reset.html" class="forgot-password-link">Esqueci minha senha</a>

                </div>

                <div class="form-login-group">
                    <p id="form-login-error">Placeholder de Erro, por agora nao tem nada precisa do backend</p>
                </div>
                
                <button type="submit">Logar</button>

            </form>

            <!-- link para a página de registro de conta-->

            <p>Não possui uma conta? <a href="register.html">Cadastre-se!</a></p>
            
        </div>
    </main>
    <footer class="footer-gennus">
        <p>&copy; 2026 Gennus. Todos os direitos reservados algo assim.</p>
    </footer>
</body>
</html>
