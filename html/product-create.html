<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos | Gennus</title>

    <link rel="stylesheet" href="../css/css-provisório.css"> <!--pode fazer o arquivo css e colocar ai-->

</head>
<body>
    <main class="product-page">

        <nav class="sidebar-main">
            <a href="dashboard.html">Dashboard</a>
            <a href="product-list.html">Produtos</a>
            <a href="sales.html">Vendas</a>
            <a href="financial.html">Finanças</a>
            <a href="reports.html">Relatórios</a>

            <nav class="sidebar-user">
                <h3>Perfil</h3>
                <a href="profile.html">nome do caba</a>
                <a href="config.html">Configurações</a>       
            </nav>
        </nav>

        <div class="product-create-cards">

            
            <form action="/servidor-php-aqui" class="product-actions">

                <div class="product-options">
                    <label for="product-name">Nome do Produto</label>
                    <input type="text" name="product-name" id="product-name" placeholder="Ex: Fones de Ouvido" required>  
                </div>

                <div class="product-options">
                    <label for="product-description">Descrição</label>
                    <input type="text" name ="product-description" id="product-description" placeholder="Ex: item para uso pessoal" required>
                </div>

                <div class="product-options">
                    <label for="product-categories-options">Categoria do Produto</label>
                        <select name="product-category-options" id="product-category-options">
                            <option value="product-category-fashion">Moda</option>
                            <option value="product-category-self-care">Cuidado Pessoal</option>
                            <option value="product-category-eletronics">Eletrônicos</option>
                            <option value="product-category-domestic">Domestico</option>
                            <option value="product-category-tools">Ferramentas</option>
                            <option value="product-category-other">Outros</option>
                        </select>
                </div>
                    
                <div class="product-options">
                    <label for="product-price">Preço</label>
                    <input type="number" name="product-price" id="product-price" placeholder="R$ 0.00" step="0.01" required>
                </div>

                <div class="product-options">
                    <label for="product-stock">Quantia</label>
                    <input type="number" name="product-stock" id="product-stock" placeholder="0" required> 
                </div>

                <div class="product-options">
                    <label for="product-status">Status do Produto</label>
                    <select name="product-status" id="product-status">
                        <option value="product-ative" selected>Ativo</option>
                        <option value="product-inactive">Inativo</option>
                    </select>
                </div>

                <div class="product-image-upload">
                    <label for="product-image">Adicione sua Imagem</label>
                    <input type="file" name="product-image" id="product-image" accept="image/*">
                </div>

            <div class="product-create-buttons">
                <button type="submit" id="product-button-save">Adicionar Produto</button>
                <button type="reset">Redefinir</button>
            </div>
            </form>
        </div>    
        
    </main>
    <script src="../javascript/main.js"></script>
    <script src="../javascript/product.js"></script> 
</body>
</html>
